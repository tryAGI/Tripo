openapi: 3.2.0
info:
  title: Tripo API
  description: Tripo API V3 for AI 3D generation, image generation, model processing, animation, files, tasks, and account
    usage. Locally maintained from https://developers.tripo3d.ai/en/docs because Tripo does not publish an unauthenticated
    OpenAPI schema.
  version: 3.0.0
servers:
- url: https://openapi.tripo3d.ai/v3
security:
- Bearer: []
paths:
  /generation/text-to-model:
    post:
      summary: Generate a 3D model from a text prompt
      operationId: textToModel
      tags:
      - ThreeDGeneration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextToModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/image-to-model:
    post:
      summary: Generate a 3D model from an image
      operationId: imageToModel
      tags:
      - ThreeDGeneration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageToModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/multiview-to-model:
    post:
      summary: Generate a 3D model from multiview images
      operationId: multiviewToModel
      tags:
      - ThreeDGeneration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiviewToModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/image-to-splat:
    post:
      summary: Generate a 3D Gaussian Splat from a single image
      operationId: imageToSplat
      tags:
      - ThreeDGeneration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageToSplatRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/text-to-image:
    post:
      summary: Generate an image from a text prompt
      operationId: textToImage
      tags:
      - Image Generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextToImageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/image-to-image:
    post:
      summary: Generate or edit an image from reference images
      operationId: imageToImage
      tags:
      - Image Generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageToImageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/image-to-multiview:
    post:
      summary: Generate multiview images from a single image
      operationId: imageToMultiview
      tags:
      - Image Generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageToMultiviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /generation/edit-multiview:
    post:
      summary: Edit multiview images
      operationId: editMultiview
      tags:
      - Image Generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMultiviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /models/import:
    post:
      summary: Import an external 3D model file
      operationId: importModel
      tags:
      - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /models/refine:
    post:
      summary: Refine a draft model
      operationId: refineModel
      tags:
      - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefineModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /models/texture:
    post:
      summary: Regenerate texture maps for an existing model
      operationId: textureModel
      tags:
      - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextureModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /models/stylize:
    post:
      summary: Stylize an existing model
      operationId: stylizeModel
      tags:
      - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StylizeModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /models/convert:
    post:
      summary: Convert a 3D model to another format
      operationId: convertModel
      tags:
      - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /animations/rig-check:
    post:
      summary: Check whether a model is riggable
      operationId: rigCheck
      tags:
      - Animation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RigCheckRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /animations/rig:
    post:
      summary: Rig a 3D model
      operationId: rigModel
      tags:
      - Animation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RigModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /animations/retarget:
    post:
      summary: Apply preset animations to a rigged 3D model
      operationId: retargetAnimation
      tags:
      - Animation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetargetAnimationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mesh/segment:
    post:
      summary: Perform semantic segmentation on a 3D model
      operationId: segmentMesh
      tags:
      - Mesh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentMeshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mesh/smartsegment:
    post:
      summary: Run the end-to-end smart segmentation pipeline
      operationId: smartSegmentMesh
      tags:
      - Mesh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmartSegmentMeshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mesh/complete:
    post:
      summary: Complete selected mesh parts
      operationId: completeMesh
      tags:
      - Mesh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteMeshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mesh/decimate:
    post:
      summary: Decimate or retopologize a 3D model
      operationId: decimateMesh
      tags:
      - Mesh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecimateMeshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreatedResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks/{task_id}:
    get:
      summary: Query the status and result of a single task
      operationId: getTask
      tags:
      - Tasks
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
        description: Unique task identifier.
  /tasks/list:
    post:
      summary: Batch query multiple tasks
      operationId: listTasks
      tags:
      - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskListRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files:
    post:
      summary: Upload a file and obtain a file_token
      operationId: uploadFile
      tags:
      - Files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files/upload-credentials:
    post:
      summary: Get direct upload credentials for large file uploads
      operationId: getUploadCredentials
      tags:
      - Files
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadCredentialsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files/presign:
    post:
      summary: Get a presigned upload URL for direct file upload
      operationId: presignFileUpload
      tags:
      - Files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignFileUploadRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignFileUploadResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /account/balance:
    get:
      summary: Query the current account credit balance
      operationId: getBalance
      tags:
      - Account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /account/usage:
    get:
      summary: Query account credit usage details
      operationId: getUsage
      tags:
      - Account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
  schemas:
    TextToModelRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Text prompt, up to 1024 characters.
          maxLength: 1024
        negative_prompt:
          type: string
          description: Negative prompt, up to 255 characters.
          maxLength: 255
        image_seed:
          type: integer
          description: Random seed for the text-to-image stage.
        model:
          type: string
          description: AI model version, for example tripo-p1, tripo-turbo, tripo-v3.1, tripo-v3.0, tripo-v2.5, or tripo-v2.0.
        model_seed:
          type: integer
          description: Random seed for geometry generation.
        face_limit:
          type: integer
          description: Maximum polycount for the output.
        texture:
          type: boolean
          description: Enable texture maps.
        pbr:
          type: boolean
          description: Enable PBR materials. When enabled, texture is forced to true.
        texture_seed:
          type: integer
          description: Random seed for texture generation.
        texture_quality:
          type: string
          description: Texture quality, such as standard, detailed, or extreme. Extreme can produce 8K textures where supported.
        geometry_quality:
          type: string
          description: Geometry quality, such as standard or detailed.
        auto_size:
          type: boolean
          description: Automatically scale the model to real-world dimensions in meters.
        quad:
          type: boolean
          description: Output a quad mesh where supported.
        smart_low_poly:
          type: boolean
          description: Generate a low-poly model with hand-crafted topology style where supported.
        generate_parts:
          type: boolean
          description: Generate editable segmented parts where supported.
        compress:
          type: string
          description: Compression type, such as geometry for meshopt compression.
        export_uv:
          type: boolean
          description: Control UV unwrapping where supported.
      required:
      - prompt
      additionalProperties: false
    ImageToModelRequest:
      type: object
      properties:
        input:
          type: string
          description: Image source. Accepts a file token, URL, or task ID.
        enable_image_autofix:
          type: boolean
          description: Automatically improve low-quality input images.
        texture_alignment:
          type: string
          description: Texture alignment priority, such as original_image or geometry.
        orientation:
          type: string
          description: Model orientation, such as default or align_image.
        model:
          type: string
          description: AI model version, for example tripo-p1, tripo-turbo, tripo-v3.1, tripo-v3.0, tripo-v2.5, or tripo-v2.0.
        model_seed:
          type: integer
          description: Random seed for geometry generation.
        face_limit:
          type: integer
          description: Maximum polycount for the output.
        texture:
          type: boolean
          description: Enable texture maps.
        pbr:
          type: boolean
          description: Enable PBR materials. When enabled, texture is forced to true.
        texture_seed:
          type: integer
          description: Random seed for texture generation.
        texture_quality:
          type: string
          description: Texture quality, such as standard, detailed, or extreme. Extreme can produce 8K textures where supported.
        geometry_quality:
          type: string
          description: Geometry quality, such as standard or detailed.
        auto_size:
          type: boolean
          description: Automatically scale the model to real-world dimensions in meters.
        quad:
          type: boolean
          description: Output a quad mesh where supported.
        smart_low_poly:
          type: boolean
          description: Generate a low-poly model with hand-crafted topology style where supported.
        generate_parts:
          type: boolean
          description: Generate editable segmented parts where supported.
        compress:
          type: string
          description: Compression type, such as geometry for meshopt compression.
        export_uv:
          type: boolean
          description: Control UV unwrapping where supported.
      required:
      - input
      additionalProperties: false
    MultiviewToModelRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            oneOf:
            - type: string
            - $ref: '#/components/schemas/MultiviewViewInput'
            - $ref: '#/components/schemas/TaskReuseInput'
          description: Multiview images. Use either view-key objects, a four item positional array, or a single task_id object.
        original_task_id:
          type: string
          description: Task ID from previous multiview generation. Mutually exclusive with inputs.
        texture_alignment:
          type: string
          description: Texture alignment priority, such as original_image or geometry.
        orientation:
          type: string
          description: Model orientation, such as default or align_image.
        model:
          type: string
          description: AI model version, for example tripo-p1, tripo-turbo, tripo-v3.1, tripo-v3.0, tripo-v2.5, or tripo-v2.0.
        model_seed:
          type: integer
          description: Random seed for geometry generation.
        face_limit:
          type: integer
          description: Maximum polycount for the output.
        texture:
          type: boolean
          description: Enable texture maps.
        pbr:
          type: boolean
          description: Enable PBR materials. When enabled, texture is forced to true.
        texture_seed:
          type: integer
          description: Random seed for texture generation.
        texture_quality:
          type: string
          description: Texture quality, such as standard, detailed, or extreme. Extreme can produce 8K textures where supported.
        geometry_quality:
          type: string
          description: Geometry quality, such as standard or detailed.
        auto_size:
          type: boolean
          description: Automatically scale the model to real-world dimensions in meters.
        quad:
          type: boolean
          description: Output a quad mesh where supported.
        smart_low_poly:
          type: boolean
          description: Generate a low-poly model with hand-crafted topology style where supported.
        generate_parts:
          type: boolean
          description: Generate editable segmented parts where supported.
        compress:
          type: string
          description: Compression type, such as geometry for meshopt compression.
        export_uv:
          type: boolean
          description: Control UV unwrapping where supported.
      required:
      - inputs
      additionalProperties: false
    InputSourceObject:
      type: object
      properties:
        url:
          type: string
          description: Public URL input.
        file_token:
          type: string
          description: Uploaded file token.
        object:
          type: object
          description: Provider-specific object storage reference.
          additionalProperties: true
      additionalProperties: false
    MultiviewViewInput:
      type: object
      description: One multiview image keyed by view name.
      properties:
        front:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/InputSourceObject'
        left:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/InputSourceObject'
        back:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/InputSourceObject'
        right:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/InputSourceObject'
      additionalProperties: false
    TaskReuseInput:
      type: object
      properties:
        task_id:
          type: string
          description: Task ID from a prior multiview image task.
      required:
      - task_id
      additionalProperties: false
    ImageToSplatRequest:
      type: object
      properties:
        input:
          type: string
          description: Source image for Gaussian Splat generation. Accepts a file_token or public image URL.
        model_seed:
          type: integer
          description: Random seed for Gaussian Splat generation.
      required:
      - input
      additionalProperties: false
    TextToImageRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Text prompt, up to 1024 characters.
          maxLength: 1024
        model:
          type: string
          description: Image model, for example seedream_v5, seedream_v4, gemini-2.5-flash, gemini-3-pro, gemini-3.1-flash,
            chat_image_1, chat_image_1.5, or chat_image_2.
        template:
          type: string
          description: Template name, such as asset_extraction, character_completion, t_pose, head_extraction, 3d_enhance,
            variants, print_clay, or figure.
        t_pose:
          type: boolean
          description: Convert to T-pose.
        sketch_to_render:
          type: boolean
          description: Convert a sketch to a rendered image.
      required:
      - prompt
      additionalProperties: false
    ImageToImageRequest:
      type: object
      properties:
        input:
          type: string
          description: Reference image. Supports file_token, image URL, or task_id.
        inputs:
          type: array
          items:
            type: string
          description: List of multiple reference images.
        prompt:
          type: string
          description: Image editing instruction. Required when template is not specified.
        model:
          type: string
          description: Image model, for example seedream_v5, gemini-2.5-flash, gemini-3-pro, gemini-3.1-flash, chat_image_1,
            chat_image_1.5, or chat_image_2.
        template:
          type: string
          description: Template name, such as asset_extraction, character_completion, t_pose, head_extraction, 3d_enhance,
            variants, print_clay, or figure.
        t_pose:
          type: boolean
          description: Convert to T-pose.
        sketch_to_render:
          type: boolean
          description: Convert a sketch to a rendered image.
      required:
      - input
      additionalProperties: false
    ImageToMultiviewRequest:
      type: object
      properties:
        input:
          type: string
          description: Source image. Supports file_token or image URL.
      required:
      - input
      additionalProperties: false
    EditMultiviewRequest:
      type: object
      properties:
        input:
          type: string
          description: Source image. Supports file_token or image URL.
      required:
      - input
      additionalProperties: false
    ImportModelRequest:
      type: object
      properties:
        input:
          type: string
          description: Model file source. Accepts file_token or URL. Supported formats include GLB, GLTF, FBX, OBJ, and STL.
      required:
      - input
      additionalProperties: false
    RefineModelRequest:
      type: object
      properties:
        input:
          type: string
          description: Draft task_id to refine.
        model:
          type: string
          description: AI model version.
      required:
      - input
      additionalProperties: false
    TextureModelRequest:
      type: object
      properties:
        input:
          type: string
          description: Model source. Accepts task_id, file_token, or URL.
        model:
          type: string
          description: AI model version.
        texture_seed:
          type: integer
          description: Random seed for texture generation.
        texture_quality:
          type: string
          description: Texture quality, such as standard, detailed, or extreme.
