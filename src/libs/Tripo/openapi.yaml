      required:
      - input
      additionalProperties: false
    RigModelRequest:
      type: object
      properties:
        input:
          type: string
          description: Model source. Accepts task_id or file_token.
        model:
          type: string
          description: Auto rigging model version, such as rig-v2.0 or rig-v1.0.
        rig_type:
          type: string
          description: Rig type, such as biped, quadruped, hexapod, octopod, avian, serpentine, or aquatic.
        spec:
          type: string
          description: Rigging specification, such as tripo or mixamo.
        out_format:
          type: string
          description: Output format, such as glb or fbx.
      required:
      - input
      additionalProperties: false
    RetargetAnimationRequest:
      type: object
      properties:
        input:
          type: string
          description: task_id of the rigged model.
        animation:
          type: string
          description: Single preset animation identifier. Mutually exclusive with animations.
        animations:
          type: array
          items:
            type: string
          description: List of multiple preset animation identifiers. Mutually exclusive with animation.
        out_format:
          type: string
          description: Output format, such as glb or fbx.
        bake_animation:
          type: boolean
          description: Bake the animation into the model. Only effective for glb output.
        export_with_geometry:
          type: boolean
          description: Export with geometry included.
        animate_in_place:
          type: boolean
          description: Play the animation in place without displacement.
