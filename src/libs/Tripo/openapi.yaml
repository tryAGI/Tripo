          type: string
          description: Segmentation model version, such as v1.0-20250506 or v2.0-20260430.
        segmentation_granularity:
          type: string
          description: v2 only. Granularity, such as simple, balanced, or detailed.
        split_by_connectivity:
          type: boolean
